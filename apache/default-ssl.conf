<IfModule mod_ssl.c>
    <VirtualHost *:443>
        # Configuracií equivalent a la del 000-default.conf però aquesta pasa per TLS.
        ServerName 192.168.221.32
        DocumentRoot /var/www/html

        # Certificat automatic que es signa cuan es munta l'imatge.
        SSLEngine on
        SSLCertificateFile /etc/apache2/ssl/cas3-selfsigned.crt
        SSLCertificateKeyFile /etc/apache2/ssl/cas3-selfsigned.key

        # Permet accés al directori rael dels documents.
        <Directory /var/www/html>
            Options -Indexes +FollowSymLinks
            AllowOverride All
            Require all granted
        </Directory>

        # Configuració dels logs, un arxiu d'erros generals i un altre per al virtualhost.
        ErrorDocument 403 /errors/403.php
        ErrorDocument 404 /errors/404.php

        # Registres adicionals per al trafic TLS i errors de SSL.
        ErrorLog ${APACHE_LOG_DIR}/cas3_ssl_error.log
        CustomLog ${APACHE_LOG_DIR}/cas3_ssl_access.log combined
    </VirtualHost>
</IfModule>
