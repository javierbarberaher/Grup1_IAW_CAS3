<VirtualHost *:80>
    # Dfineix el nom del host i la rael dels documents.
    ServerName 192.168.221.32
    DocumentRoot /var/www/html

    # Permet accés al directori rael dels documents.
    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Configuració dels logs, un arxiu d'erros generals i un altre per al virtualhost.
    ErrorLog ${APACHE_LOG_DIR}/cas3_error.log
    CustomLog ${APACHE_LOG_DIR}/cas3_access.log combined
</VirtualHost>
